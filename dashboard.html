<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONG Operational Terminal</title>
    <style>
        :root {
            --accent: #FF4B5C; 
            --bg-soft: #f8f9fa;
            --white: #FFFFFF;
            --dark: #1A1A1A;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--white);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }

        .loader {
            width: 48px; height: 48px;
            border: 5px solid var(--bg-soft);
            border-bottom-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .dash-btn {
            background: #fff;
            border: 1px solid #eee;
            padding: 25px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .dash-btn:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            background: #fff9f9;
        }

        .logout-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Letak dalam bahagian <style> */
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
            box-shadow: 0 0 8px #2ecc71;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .hidden { display: none; }
        #process-text { font-family: monospace; color: var(--accent); }
    </style>
</head>
<body>

    <div id="main-menu" class="card">
        <img src="koko.png" alt="CEMA" style="width: 140px; margin-bottom: 10px;">
        <h2>OPERATIONAL TERMINAL</h2>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">Authenticated: Cadet Officer</p>
        
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px;">
            <span class="status-dot"></span>
            <span style="color: #2e7d32; font-weight: bold; font-size: 0.85rem; letter-spacing: 1px;">
                OPERATION STATUS: ACTIVE
            </span>
        </div>

        <div class="grid">
            <button class="dash-btn" onclick="startProcess('CYBER INTEL', 'ANALYZING THREATS...')">🛡️<br>INTEL</button>
            <button class="dash-btn" onclick="startProcess('SPECTRUM OPS', 'SCANNING NETWORK...')">📡<br>SPECTRUM</button>
            <button class="dash-btn" onclick="startProcess('AUDIT LOGS', 'FETCHING RECORDS...')">📋<br>LOGS</button>
            <button class="dash-btn" onclick="startProcess('PQC CONFIG', 'ENCRYPTING DATA...')">🔒<br>PQC</button>
        </div>

        <button class="logout-btn" onclick="location.href='/'">SECURE LOGOUT</button>
    </div>

    <div id="loading-screen" class="card hidden">
        <span class="loader"></span>
        <h2 id="process-title">SYSTEM</h2>
        <p id="process-text">INITIALIZING...</p>
        <div style="width: 100%; background: #eee; height: 8px; border-radius: 10px; margin: 20px 0; overflow: hidden;">
            <div id="progress-fill" style="width: 0%; background: var(--accent); height: 100%; transition: 0.2s;"></div>
        </div>
        <button onclick="resetDashboard()" style="border: none; background: none; color: #888; cursor: pointer;">Cancel Process</button>
    </div>

    <script>
        let processInterval;

        function startProcess(title, message) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('process-title').innerText = title;
            document.getElementById('process-text').innerText = message;

            let width = 0;
            const fill = document.getElementById('progress-fill');
            
            processInterval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(processInterval);
                    setTimeout(() => {
                        alert(title + " COMPLETED!");
                        resetDashboard();
                    }, 500);
                } else {
                    width += Math.random() * 15;
                    if(width > 100) width = 100;
                    fill.style.width = width + '%';
                }
            }, 300);
        }

        function resetDashboard() {
            clearInterval(processInterval);
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('loading-screen').classList.add('hidden');
        }
    </script>
</body>
</html>
