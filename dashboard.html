<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONG Operational Terminal</title>
    <style>
        :root {
            --accent: #FF4B5C; 
            --accent-hover: #e63e4f;
            --bg-soft: #f8f9fa;
            --text-main: #2D2D2D;
            --white: #FFFFFF;
            --dark: #1A1A1A;
            --border: #edf0f2;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--white);
            width: 95%;
            max-width: 650px;
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .auth-logo {
            width: 90px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        h2 {
            margin: 10px 0 5px;
            letter-spacing: 1px;
            color: var(--dark);
            font-size: 1.5rem;
        }

        .status-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 35px;
        }

        .dash-btn {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 30px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .dash-btn i {
            font-size: 2rem;
        }

        .dash-btn span {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-main);
        }

        .dash-btn:hover {
            border-color: var(--accent);
            background-color: #fff9f9;
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(255, 75, 92, 0.1);
        }

        .logout-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 14px 45px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #333;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="koko.png" alt="CEMA Logo" class="auth-logo" style="width: 140px;">
        </div>
        
        <h2>OPERATIONAL TERMINAL</h2>
        <div class="status-badge">● ENCRYPTED SESSION ACTIVE</div>
        
        <div class="grid">
            <button class="dash-btn" onclick="alert('Accessing Cyber Intel...')">
                <span>🛡️</span>
                <span>CYBER INTEL</span>
            </button>
            <button class="dash-btn" onclick="alert('Scanning Spectrum...')">
                <span>📡</span>
                <span>SPECTRUM OPS</span>
            </button>
            <button class="dash-btn" onclick="alert('Opening System Logs...')">
                <span>📋</span>
                <span>AUDIT LOGS</span>
            </button>
            <button class="dash-btn" onclick="alert('Initializing Security Protocol...')">
                <span>🔒</span>
                <span>PQC CONFIG</span>
            </button>
        </div>

        <button class="logout-btn" onclick="location.href='/'">
            SECURE LOGOUT
        </button>
    </div>

</body>
</html>
