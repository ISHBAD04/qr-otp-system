<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMA Operational Terminal</title>
    <style>
        :root {
            --accent: #FF4B5C; 
            --bg-soft: #f8f9fa;
            --white: #FFFFFF;
            --dark: #1A1A1A;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .card {
            background: var(--white);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            transition: 0.5s;
        }

        /* Loading Animation Style */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid var(--bg-soft);
            border-bottom-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .dash-btn {
            background: #fff;
            border: 1px solid #eee;
            padding: 25px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .dash-btn:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            background: #fff9f9;
        }

        .hidden { display: none; }

        #process-text {
            font-family: monospace;
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="main-menu" class="card">
        <img src="koko.png" alt="CEMA" style="width: 120px; margin-bottom: 10px;">
        <h2>CEMA TERMINAL</h2>
        <p style="font-size: 0.8rem; color: #888;">Select Operation Module</p>
        
        <div class="grid">
            <button class="dash-btn" onclick="startProcess('CYBER INTEL', 'ANALYZING THREAT VECTORS...')">🛡️<br>INTEL</button>
            <button class="dash-btn" onclick="startProcess('SPECTRUM OPS', 'SCANNING NETWORK SPECTRUM...')">📡<br>SPECTRUM</button>
            <button class="dash-btn" onclick="startProcess('AUDIT LOGS', 'FETCHING SYSTEM RECORDS...')">📋<br>LOGS</button>
            <button class="dash-btn" onclick="startProcess('PQC CONFIG', 'INITIALIZING QUANTUM SHIELD...')">🔒<br>PQC</button>
        </div>
        <button onclick="location.href='/'" style="margin-top: 20px; border: none; background: none; color: #888; cursor: pointer;">Logout</button>
    </div>

    <div id="loading-screen" class="card hidden">
        <span class="loader"></span>
        <h2 id="process-title">SYSTEM</h2>
        <p id="process-text">INITIALIZING...</p>
        <div id="progress-bar" style="width: 100%; background: #eee; height: 5px; border-radius: 10px; margin-top: 10px;">
            <div id="progress-fill" style="width: 0%; background: var(--accent); height: 100%; border-radius: 10px; transition: 0.1s;"></div>
        </div>
    </div>

    <script>
        function startProcess(title, message) {
            // Sembunyikan menu, tunjuk loading
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            
            document.getElementById('process-title').innerText = title;
            document.getElementById('process-text').innerText = message;

            let width = 0;
            const fill = document.getElementById('progress-fill');
            
            // Animasi loading bar
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        alert(title + " COMPLETED!");
                        resetDashboard();
                    }, 500);
                } else {
                    width += Math.random() * 10;
                    if(width > 100) width = 100;
                    fill.style.width = width + '%';
                }
            }, 200);
        }

        function resetDashboard() {
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('loading-screen').classList.add('hidden');
        }
    </script>
</body>
</html>
