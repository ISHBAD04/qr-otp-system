<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQC VAULT - CONCLUSION</title>
    <style>
        body { 
            background: #0F051D; 
            color: #FF4B5C; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 75, 92, 0.05) 0%, transparent 70%);
        }

        .vault-box { 
            border: 3px solid #FF4B5C; 
            padding: 60px; 
            border-radius: 30px; 
            text-align: center; 
            width: 85%; 
            max-width: 900px;
            box-shadow: 0 0 40px rgba(255, 75, 92, 0.2), inset 0 0 20px rgba(255, 75, 92, 0.1); 
            background: rgba(26, 18, 41, 0.8);
        }

        h1 { 
            font-size: 3.5rem; 
            margin-bottom: 40px; 
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(255, 75, 92, 0.6);
        }

        p { 
            font-size: 1.8rem; 
            color: #FFFFFF; 
            line-height: 1.8; 
            margin: 20px 0;
        }

        /* BUTTON SMART & TAKTIKAL */
        .btn-exit {
            margin-top: 50px;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #FF4B5C;
            background: transparent;
            border: 2px solid #FF4B5C;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 75, 92, 0.3);
            overflow: hidden;
        }

        .btn-exit:hover {
            background: #FF4B5C;
            color: #0F051D;
            box-shadow: 0 0 40px rgba(255, 75, 92, 0.8);
            transform: translateY(-5px) scale(1.05);
        }

        .btn-exit:active {
            transform: translateY(0) scale(0.98);
        }

    </style>
</head>
<body>
    <div class="vault-box">
        <h1>[ KESIMPULAN STRATEGIK ]</h1>
        
        <p>Program ini dirangka secara berperingkat dari asas hingga kepakaran tinggi bagi menjamin <strong>Kedaulatan Digital Negara</strong>
