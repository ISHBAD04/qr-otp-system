<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONG Operational Terminal</title>
    <style>
        :root {
            /* Warna dari imej Technology yang kau bagi */
            --bg-deep: #0F051D;          /* Ungu gelap angkasa */
            --card-bg: #1A1229;          /* Latar belakang kad */
            --neon-cyan: #00D2FF;        /* Biru neon untuk status/highlight */
            --neon-purple: #B16BFF;      /* Ungu neon untuk button */
            --accent: #5E5CE6;           /* Warna utama (Purple-Blue) */
            --text-pure: #FFFFFF;
            --text-dim: #A19BB7;
            --grad-main: linear-gradient(135deg, #5E5CE6 0%, #B16BFF 100%);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-deep);
            color: var(--text-pure);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Efek glow ambient */
            background-image: radial-gradient(circle at 50% -20%, rgba(0, 210, 255, 0.15) 0%, transparent 50%);
        }

        .card {
            background: var(--card-bg);
            width: 95%;
            max-width: 500px;
            padding: 40px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h2 {
            color: var(--neon-cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.4rem;
            margin-bottom: 30px;
        }

        /* Loader yang lebih cool */
        .loader {
            width: 50px; 
            height: 50px;
            border: 4px solid rgba(0, 210, 255, 0.1);
            border-bottom-color: var(--neon-cyan);
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 8px var(--neon-cyan));
        }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        /* Button Grid ala Tech Panel */
        .dash-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-pure);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dash-btn:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-5px);
            background: rgba(0, 210, 255, 0.05);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.15);
        }

        /* Logout Button guna Gradient */
        .logout-btn {
            background: var(--grad-main);
            color: white;
            border: none;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(94, 92, 230, 0.3);
        }

        .logout-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 25px rgba(177, 107, 255, 0.5);
        }

        /* Status Dot Neon */
        .status-dot {
            height: 12px;
            width: 12px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
            box-shadow: 0 0 12px var(--neon-cyan);
            margin-right: 8px;
        }

        @keyframes blink {
            0% { opacity: 1; box-shadow: 0 0 12px var(--neon-cyan); }
            50% { opacity: 0.4; box-shadow: 0 0 4px var(--neon-cyan); }
            100% { opacity: 1; box-shadow: 0 0 12px var(--neon-cyan); }
        }

        .hidden { display: none; }
        
        #process-text { 
            font-family: 'Courier New', monospace; 
            color: var(--neon-cyan); 
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        p { color: var(--text-dim); }
    </style>
</head>
<body>

    <div id="main-menu" class="card">
        <img src="koko.png" alt="CEMA" style="width: 140px; margin-bottom: 10px;">
        <h2>PELAN PEMBANGUNAN KEPAKARAN SIBER</h2>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">Authenticated: Cadet Officer</p>
        
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px;">
            <span class="status-dot"></span>
            <span style="color: #2e7d32; font-weight: bold; font-size: 0.85rem; letter-spacing: 1px;">
                OPERATION STATUS: ACTIVE
            </span>
        </div>

        <div class="grid">
            <button class="dash-btn" onclick="startProcess('CYBER INTEL', 'ANALYZING THREATS...')">🛡️<br>PENEGNALAN</button>
            <button class="dash-btn" onclick="startProcess('SPECTRUM OPS', 'SCANNING NETWORK...')">📡<br>TAHAP PEMBANGUNAN</button>
            <button class="dash-btn" onclick="startProcess('AUDIT LOGS', 'FETCHING RECORDS...')">📋<br>PENSIJILAN</button>
            <button class="dash-btn" onclick="startProcess('PQC CONFIG', 'ENCRYPTING DATA...')">🔒<br>KESIMPULAN</button>
        </div>

        <button class="logout-btn" onclick="location.href='/'">SECURE LOGOUT</button>
    </div>

    <div id="loading-screen" class="card hidden">
        <span class="loader"></span>
        <h2 id="process-title">SYSTEM</h2>
        <p id="process-text">INITIALIZING...</p>
        <div style="width: 100%; background: #eee; height: 8px; border-radius: 10px; margin: 20px 0; overflow: hidden;">
            <div id="progress-fill" style="width: 0%; background: var(--accent); height: 100%; transition: 0.2s;"></div>
        </div>
        <button onclick="resetDashboard()" style="border: none; background: none; color: #888; cursor: pointer;">Cancel Process</button>
    </div>

    <script>
        let processInterval;

        function startProcess(title, message) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('process-title').innerText = title;
            document.getElementById('process-text').innerText = message;

            let width = 0;
            const fill = document.getElementById('progress-fill');
            
            processInterval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(processInterval);
                    
                    // Tunggu sekejap lepas loading 100% baru lompat ke page baru
                    setTimeout(() => {
                        if(title === 'CYBER INTEL') window.location.href = 'intel.html';
                        if(title === 'SPECTRUM OPS') window.location.href = 'spectrum.html';
                        if(title === 'AUDIT LOGS') window.location.href = 'logs.html';
                        if(title === 'PQC CONFIG') window.location.href = 'pqc.html';
                    }, 800); 

                } else {
                    width += Math.random() * 15;
                    if(width > 100) width = 100;
                    fill.style.width = width + '%';
                }
            }, 300);
        }

        function resetDashboard() {
            clearInterval(processInterval);
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('loading-screen').classList.add('hidden');
        }
    </script>
</body>
</html>
