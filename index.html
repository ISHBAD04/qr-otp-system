<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR OTP System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f7f6; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        button { background: #003366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        #qr-code img { margin-top: 20px; border: 5px solid #fff; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR OTP Login</h1>
        <button onclick="generateQR()">Step 1: Generate QR Code</button>
        <div id="qr-code"></div>
        <hr>
        <input type="text" id="otp-input" placeholder="Enter 6-digit OTP">
        <button onclick="verifyOTP()">Step 2: Login</button>
    </div>

    <script>
        const API_URL = 'https://qr-otp-system-g32y.vercel.app';

        async function generateQR() {
            const res = await fetch(`${API_URL}/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: 'user123' })
            });
            const data = await res.json();
            document.getElementById('qr-code').innerHTML = `<img src="${data.qrCode}" alt="QR Code">`;
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp-input').value;
            const res = await fetch(`${API_URL}/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: 'user123', userOtp: otp })
            });
            const data = await res.json();
            alert(data.message || (data.success ? "Access Granted!" : "Error"));
        }
    </script>
</body>
</html>
