<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONG Premium Auth & Terminal</title>
    <style>
        :root {
            --accent: #FF4B5C; 
            --bg-soft: #FFF5F6;
            --text-main: #2D2D2D;
            --white: #FFFFFF;
            --dark: #1A1A1A;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        /* --- BUBBLE CANVAS --- */
        #bubble-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows clicking through the bubbles */
            z-index: 9999;
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-soft);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top, 40px) 20px 20px;
            overflow-y: auto;
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 380px;
            padding: 30px 20px;
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(255, 75, 92, 0.12);
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-circle {
            width: 75px;
            height: 75px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 2px solid #FFE0E3;
            border-radius: 20px;
            margin: 15px 0;
            font-size: 1.3rem;
            text-align: center;
            outline: none;
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active { transform: scale(0.97); }

        /* --- DASHBOARD VIEW --- */
        .dashboard-content {
            display: none; 
            width: 100%;
            max-width: 480px;
            padding: env(safe-area-inset-top, 40px) 20px 40px;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--white);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.04);
        }

        .stat-label { font-size: 0.7rem; color: #999; text-transform: uppercase; font-weight: 600; }
        .stat-value { font-size: 1.3rem; font-weight: 800; margin-top: 5px; }

        .qr-card {
            background: white;
            padding: 22px;
            border-radius: 28px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.04);
        }

        .log-entry {
            font-size: 0.75rem;
            padding: 12px 0;
            border-bottom: 1px solid #F6F6F6;
            display: flex;
        }

        .log-time { color: var(--accent); font-weight: bold; min-width: 45px; }
        .log-text { color: #555; }

        .secondary-btn {
            background: var(--dark) !important;
            font-size: 0.8rem !important;
            padding: 15px !important;
            margin-top: 12px;
            border-radius: 18px !important;
        }

        .bubble-trigger-btn {
            background: #6C5CE7 !important; /* Distinct Purple Color */
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        #military-time {
            font-family: monospace;
            background: #222;
            color: #00FF00;
            padding: 8px 16px;
            border-radius: 10px;
            margin-top: auto;
            margin-bottom: 30px;
        }

        @media (max-width: 480px) {
            .stat-value { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <canvas id="bubble-canvas"></canvas>

    <div id="login-overlay">
        <div class="logo-circle">MONG</div>
        <div class="login-card">
            <h2>Secure Access</h2>
            <div id="login-qr-spot" style="min-height: 180px; display: flex; align-items: center; justify-content: center;"></div>
            <button onclick="generateQR('login-qr-spot')" style="background: var(--dark); margin-bottom: 10px;">GENERATE QR</button>
            <input type="tel" id="otp-input" placeholder="000 000" maxlength="6">
            <button onclick="verifyAndEnter()">VERIFY & START</button>
        </div>
        <div id="military-time">0000:00H</div>
    </div>

    <div class="login-card">
        <div style="display: flex; gap: 8px; margin-bottom: 20px; background: #F0F0F0; padding: 5px; border-radius: 15px;">
            <button id="tab-login" onclick="switchAuthMode('login')" style="padding: 10px; font-size: 0.7rem; background: var(--dark); border-radius: 12px;">LOGIN</button>
            <button id="tab-register" onclick="switchAuthMode('register')" style="padding: 10px; font-size: 0.7rem; background: transparent; color: #555; border-radius: 12px;">REGISTER</button>
        </div>

        <h2 id="auth-title">Secure Access</h2>
        <p id="auth-desc" style="font-size: 0.8rem; color: #888; margin-top: -10px;">Verify identity to access terminal</p>

        <div id="login-qr-spot" style="min-height: 180px; display: flex; align-items: center; justify-content: center; border: 2px dashed #FFE0E3; border-radius: 20px; margin: 10px 0;">
            <span style="color: #CCC; font-size: 0.8rem;">System Idle</span>
        </div>

        <div id="reg-controls" style="display: none;">
            <input type="text" id="reg-username" placeholder="New Username" style="font-size: 1.1rem; margin: 10px 0;">
            <button onclick="handleRegister()" style="background: var(--dark);">INITIALIZE IDENTITY</button>
        </div>

        <div id="login-controls">
            <button onclick="generateQR('login-qr-spot')" style="background: var(--dark); margin-bottom: 10px;">GENERATE LOGIN QR</button>
            <input type="tel" id="otp-input" placeholder="000 000" maxlength="6">
            <button onclick="verifyAndEnter()">VERIFY & START</button>
        </div>
    </div>

    <script>
        // --- AUTHENTICATION MODE SWITCHING ---
        function switchAuthMode(mode) {
            const isReg = mode === 'register';
            document.getElementById('reg-controls').style.display = isReg ? 'block' : 'none';
            document.getElementById('login-controls').style.display = isReg ? 'none' : 'block';
            
            document.getElementById('auth-title').innerText = isReg ? 'Register User' : 'Secure Access';
            document.getElementById('auth-desc').innerText = isReg ? 'Initialize a new PQC-safe profile' : 'Verify identity to access terminal';
            document.getElementById('login-qr-spot').innerHTML = '<span style="color: #CCC; font-size: 0.8rem;">System Idle</span>';

            // Update Tab Styles
            const loginBtn = document.getElementById('tab-login');
            const regBtn = document.getElementById('tab-register');
            
            if (isReg) {
                regBtn.style.background = 'var(--dark)';
                regBtn.style.color = 'white';
                loginBtn.style.background = 'transparent';
                loginBtn.style.color = '#555';
            } else {
                loginBtn.style.background = 'var(--dark)';
                loginBtn.style.color = 'white';
                regBtn.style.background = 'transparent';
                regBtn.style.color = '#555';
            }
        }

        // --- REGISTRATION LOGIC ---
        async function handleRegister() {
            const username = document.getElementById('reg-username').value;
            if (!username) return alert("Please enter a username");

            const res = await fetch(`${API_BASE}/generate`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ userId: username })
            });
            const data = await res.json();
            
            if (data.qrCode) {
                document.getElementById('login-qr-spot').innerHTML = `
                    <div style="text-align: center;">
                        <img src="${data.qrCode}" width="160" style="border-radius:15px; border:4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                        <p style="font-size: 0.6rem; color: var(--accent); font-weight: bold; margin-top: 8px;">SCAN WITH AUTHENTICATOR APP</p>
                    </div>`;
                alert("Success! Scan the QR code, then switch to the Login tab.");
            }
        }

        // --- UPDATED VERIFICATION LOGIC ---
        async function verifyAndEnter() {
            const otp = document.getElementById('otp-input').value;
            // In a real app, you'd track which user is logging in. 
            // For now, it checks the username from the reg field or defaults to Admin.
            const user = document.getElementById('reg-username').value || 'Admin_User';
            
            const res = await fetch(`${API_BASE}/verify`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ userId: user, userOtp: otp })
            });
            
            const data = await res.json();
            if (data.success) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-dash').style.display = 'block';
            } else {
                alert("Access Denied: Invalid Security Token");
            }
        }
    </script>

    <div class="dashboard-content" id="main-dash">
        <div class="dash-header">
            <div>
                <h2 style="margin:0; color: var(--accent);">MONG TERMINAL</h2>
                <p style="margin:0; font-size: 0.7rem; color: #888;">PQC-HYBRID ACTIVE</p>
            </div>
            <button onclick="location.reload()" style="width:auto; padding:8px 15px; font-size:0.7rem; background:#EEE; color:#333;">LOG OUT</button>
        </div>

        <div class="status-grid">
            <div class="stat-box"><span class="stat-label">Network</span><div class="stat-value">24%</div></div>
            <div class="stat-box"><span class="stat-label">Threats</span><div class="stat-value" style="color: var(--accent);">02</div></div>
        </div>

        <div class="qr-card">
            <h3 style="font-size: 0.9rem;">SEC-OPS ACTIVITY LOG</h3>
            <div id="log-container">
                <div class="log-entry"><span class="log-time">0845</span><span class="log-text">Session established</span></div>
                <div class="log-entry"><span class="log-time">0730</span><span class="log-text">Quantum-Safe Verified</span></div>
            </div>
            
            <button class="bubble-trigger-btn" onclick="startBubbles()">ACTIVATE BUBBLE UI</button>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px;">
                <button class="secondary-btn" onclick="alert('Scanning...')">SCAN</button>
                <button class="secondary-btn" onclick="alert('Exported')">EXPORT</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://qr-otp-system-g32y.vercel.app";
        
        // --- BUBBLE ANIMATION ENGINE ---
        const canvas = document.getElementById('bubble-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Bubble {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 100;
                this.radius = Math.random() * 15 + 5;
                this.speed = Math.random() * 3 + 2;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.wobble = Math.random() * 0.05;
                this.wobbleInc = 0;
            }
            update() {
                this.y -= this.speed;
                this.x += Math.sin(this.wobbleInc) * 2;
                this.wobbleInc += this.wobble;
                if (this.y < -50) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 75, 92, ${this.opacity})`;
                ctx.fill();
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity + 0.2})`;
                ctx.stroke();
            }
        }

        function startBubbles() {
            if(particles.length > 0) return; // Prevent multiple clicks
            for(let i = 0; i < 40; i++) {
                particles.push(new Bubble());
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        // --- EXISTING LOGIC ---
        function updateClock() {
            const now = new Date();
            document.getElementById('military-time').innerText = `${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}H`;
        }
        setInterval(updateClock, 1000);

        async function generateQR(id) {
            const res = await fetch(`${API_BASE}/generate`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: 'Admin_User'})});
            const data = await res.json();
            if(data.qrCode) document.getElementById(id).innerHTML = `<img src="${data.qrCode}" width="160" style="border-radius:15px; border:4px solid #fff;">`;
        }

        async function verifyAndEnter() {
            const otp = document.getElementById('otp-input').value;
            const res = await fetch(`${API_BASE}/verify`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: 'Admin_User', userOtp: otp})});
            const data = await res.json();
            if (data.success) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-dash').style.display = 'block';
            } else alert("Denied");
        }
    </script>
</body>
</html>
