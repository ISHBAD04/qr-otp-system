<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONG QR LOGIN SYSTEM</title>
    <style>
        :root {
            /* Palet warna dari imej Technology Canva */
            --bg-deep: #0F051D;          /* Ungu gelap angkasa */
            --card-bg: #1A1229;          /* Warna kad lebih cerah sikit */
            --neon-cyan: #00D2FF;        /* Warna biru terang neon */
            --neon-purple: #B16BFF;      /* Warna ungu cerah */
            --text-pure: #FFFFFF;        /* Putih bersih */
            --text-muted: #A19BB7;       /* Kelabu ungu untuk teks kurang penting */
            --grad-btn: linear-gradient(135deg, #5E5CE6 0%, #B16BFF 100%);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-deep);
            color: var(--text-pure);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            /* Efek cahaya glow kat background */
            background-image: radial-gradient(circle at 10% 20%, rgba(94, 92, 230, 0.15) 0%, transparent 50%),
                            radial-gradient(circle at 90% 80%, rgba(177, 107, 255, 0.1) 0%, transparent 50%);
        }

        .card {
            background: var(--card-bg);
            width: 90%;
            max-width: 400px;
            padding: 40px 25px;
            border-radius: 28px;
            /* Border halus supaya nampak premium */
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            align-self: center;
        }

        .auth-logo {
            display: block;
            width: 100%;
            max-width: 130px; 
            height: auto;
            margin: 0 auto 20px;
            /* Efek glow pada logo CEMA kau */
            filter: drop-shadow(0 0 12px rgba(0, 210, 255, 0.4));
        }

        h2 {
            color: var(--neon-cyan);
            font-size: 1.6rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        input {
            width: 100%; 
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; 
            margin: 10px 0;
            text-align: center; 
            outline: none;
            font-size: 16px;
            color: white;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: var(--neon-cyan);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        button {
            width: 100%; 
            padding: 18px;
            background: var(--grad-btn);
            color: white; 
            border: none;
            border-radius: 14px; 
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer; 
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(94, 92, 230, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(177, 107, 255, 0.5);
        }

        button:active { 
            transform: scale(0.97); 
        }

        #pc-view, #mobile-view { 
            display: none; 
        }
        
        .loading-text {
            margin-top: 15px; 
            font-family: 'Courier New', monospace; 
            color: var(--neon-cyan);
            font-size: 12px;
            letter-spacing: 2px;
            animation: blink 1.2s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* Custom scrollbar kalau perlu */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="pc-view" class="card">
        <img src="koko.png" alt="CEMA Logo" class="auth-logo">
        <h2>SECURE ACCESS</h2>
        <div id="login-form">
            <input type="text" id="login-username" placeholder="Masukkan Nama Anda">
            <button id="init-btn" onclick="requestHandshake()">INITIALIZE SESSION</button>
        </div>
        
        <div id="qr-container" style="display: none; margin-top: 20px;">
            <div id="qr-spot"></div>
            <p style="font-size: 0.9rem; color: var(--accent); font-weight: bold;">Scan dengan telefon untuk pengesahan</p>
            <div class="loading-text">MENUNGGU PENGESAHAN...</div>
        </div>
    </div>

    <div id="mobile-view" class="card">
        <img src="koko.png" alt="CEMA Logo" class="auth-logo">
        <h2>Authorize Login?</h2>
        <p style="color: #888;">Sahkan untuk membenarkan akses terminal kepada sesi ini.</p>
        <button id="approve-btn" onclick="approveSession()" style="background: var(--dark);">APPROVE ACCESS</button>
        <p id="status-msg" style="display:none; margin-top:15px; font-weight:bold; color: green;">BERJAYA! Sila lihat skrin terminal.</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('id');

        window.onload = () => {
            if (sessionId) {
                document.getElementById('mobile-view').style.display = 'block';
            } else {
                document.getElementById('pc-view').style.display = 'block';
            }
        };

        async function requestHandshake() {
            const userField = document.getElementById('login-username');
            const btn = document.getElementById('init-btn');
            const user = userField.value;

            if (!user) return alert("Sila masukkan Username");

            btn.disabled = true;
            btn.innerText = "CONNECTING...";

            try {
                const res = await fetch('/request-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user })
                });

                if (!res.ok) throw new Error('Server Error');

                const data = await res.json();

                if (data.qrImage) {
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('qr-container').style.display = 'block';
                    document.getElementById('qr-spot').innerHTML = `<img src="${data.qrImage}" style="width: 100%; max-width: 200px;">`;

                    const poll = setInterval(async () => {
                        try {
                            const statusRes = await fetch(`/check-status?id=${data.sessionId}`);
                            const statusData = await statusRes.json();
                            
                            if (statusData.status === 'approved') {
                                clearInterval(poll);
                                window.location.href = '/dashboard.html'; 
                            }
                        } catch (e) { console.error("Polling error"); }
                    }, 2000);     
                }
            } catch (err) {
                alert("Database or Connection Error! Sila check internet/hotspot.");
                btn.disabled = false;
                btn.innerText = "INITIALIZE SESSION";
            }
        }

        async function approveSession() {
            const btn = document.getElementById('approve-btn');
            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            try {
                const res = await fetch(`/approve-session?id=${sessionId}`);
                if (res.ok) {
                    btn.style.display = 'none';
                    document.getElementById('status-msg').style.display = 'block';
                } else {
                    alert("Gagal mengesahkan sesi.");
                    btn.disabled = false;
                    btn.innerText = "APPROVE ACCESS";
                }
            } catch (err) {
                alert("Error: Sambungan terputus.");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
