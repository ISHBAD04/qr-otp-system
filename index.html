<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONG QR LOGIN TESTING WEB</title>
    <style>
        :root {
            --accent: #FF4B5C; 
            --bg-soft: #FFF5F6;
            --text-main: #2D2D2D;
            --white: #FFFFFF;
            --dark: #1A1A1A;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: var(--white);
            width: 90%;
            max-width: 400px;
            padding: 30px 20px;
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(255, 75, 92, 0.12);
            text-align: center;
            align-self: center;
        }

        .auth-logo {
            display: block;
            width: 100%;
            max-width: 150px; 
            height: auto;
            margin: 0 auto 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
        }

        input {
            width: 100%; padding: 15px;
            border: 2px solid #FFE0E3;
            border-radius: 15px; margin: 8px 0;
            text-align: center; outline: none;
        }

        button {
            width: 100%; padding: 18px;
            background: var(--accent);
            color: white; border: none;
            border-radius: 50px; font-weight: 700;
            cursor: pointer; margin-top: 10px;
        }

        #pc-view, #mobile-view, #main-dash { display: none; }
    </style>
</head>
<body>

    <div id="pc-view" class="card">
        <img src="koko.png" alt="CEMA Logo" class="auth-logo">
        <h2>SECURE ACCESS</h2>
        <div id="login-form">
            <input type="text" id="login-username" placeholder="Username">
            <button onclick="requestHandshake()">INITIALIZE SESSION</button>
        </div>
        
        <div id="qr-container" style="display: none; margin-top: 20px;">
            <div id="qr-spot"></div>
            <p style="font-size: 0.8rem; color: var(--accent);">Scan with phone to authorize</p>
            <div style="margin-top: 10px; font-family: monospace; color: #888;">WAITING...</div>
        </div>
    </div>

    <div id="mobile-view" class="card">
        <img src="koko.png" alt="CEMA Logo" class="auth-logo">
        <h2>Authorize Login?</h2>
        <p style="color: #888;">Confirm to grant terminal access to this session.</p>
        <button onclick="approveSession()" style="background: var(--dark);">APPROVE ACCESS</button>
    </div>

    <div id="main-dash" style="padding: 40px; text-align: center;">
        <img src="koko.png" alt="CEMA Logo" style="width: 300px; margin-bottom: 20px;">
        <h1 style="color: var(--accent);">TERMINAL ACTIVE</h1>
        <p>PQC-Hybrid Handshake Verified.</p>
        <button onclick="location.href='/'" style="width: auto; padding: 10px 20px;">LOGOUT</button>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('id');

        window.onload = () => {
            if (sessionId) {
                document.getElementById('mobile-view').style.display = 'block';
            } else {
                document.getElementById('pc-view').style.display = 'block';
            }
        };

        async function requestHandshake() {
            const user = document.getElementById('login-username').value;
            if (!user) return alert("Enter Username");

            const res = await fetch(`${API_BASE}/request-session`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user })
            });
            const data = await res.json();

            if (data.qrImage) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('qr-container').style.display = 'block';
                document.getElementById('qr-spot').innerHTML = `<img src="${data.qrImage}" width="180">`;

                const poll = setInterval(async () => {
                    const statusRes = await fetch(`${API_BASE}/check-status?id=${data.sessionId}`);
                    const status = await statusRes.json();
                    
                    if (status.status === 'approved') {
                        clearInterval(poll);
                        // Tukar bahagian ni supaya dia pergi ke page baru
                        window.location.href = '/dashboard'; 
                    }
                }, 2000);     
            }
        }

        async function approveSession() {
            window.location.href = `${API_BASE}/approve-session?id=${sessionId}`;
        }
    </script>
</body>
</html>
