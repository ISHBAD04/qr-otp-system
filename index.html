<!DOCTYPE html>
<html>
<head>
    <title>QR OTP Tester</title>
    <style>
    body { 
        font-family: 'Segoe UI', sans-serif; 
        text-align: center; 
        padding-top: 50px; 
        background-color: #f4f4f9;
    }
    button { 
        padding: 12px 24px; 
        font-size: 16px; 
        font-weight: bold;
        background-color: #007bff; 
        color: white; 
        border: none; 
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }
    button:hover {
        background-color: #0056b3;
    }
    .card {
        background: white;
        padding: 20px;
        display: inline-block;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        margin-top: 20px;
    }
    </style>
</head>
<body>
    <h1>QR Code OTP System</h1>
    <button onclick="generate()">Generate QR & OTP</button>
    <div id="output"></div>
    
    <script>
        async function generate() {
            const res = await fetch('https://qr-otp-system-g32y.vercel.app/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: 'user1' })
            });
            const data = await res.json();
            document.getElementById('output').innerHTML = `
                <p>Your OTP: <b>${data.otp}</b></p>
                <img src="${data.qrCode}">
            `;
        }
    </script>
</body>
</html>
