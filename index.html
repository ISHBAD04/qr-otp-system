<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONG QR LOGIN SYSTEM</title>
    <style>
        :root {
            --accent: #FF4B5C; 
            --bg-soft: #FFF5F6;
            --text-main: #2D2D2D;
            --white: #FFFFFF;
            --dark: #1A1A1A;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: var(--white);
            width: 90%;
            max-width: 400px;
            padding: 30px 20px;
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(255, 75, 92, 0.12);
            text-align: center;
            align-self: center;
        }

        .auth-logo {
            display: block;
            width: 100%;
            max-width: 150px; 
            height: auto;
            margin: 0 auto 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
        }

        input {
            width: 100%; padding: 15px;
            border: 2px solid #FFE0E3;
            border-radius: 15px; margin: 8px 0;
            text-align: center; outline: none;
            font-size: 16px;
        }

        button {
            width: 100%; padding: 18px;
            background: var(--accent);
            color: white; border: none;
            border-radius: 50px; font-weight: 700;
            cursor: pointer; margin-top: 10px;
            transition: 0.3s;
        }

        button:active { transform: scale(0.98); }

        #pc-view, #mobile-view { display: none; }
        
        .loading-text {
            margin-top: 10px; 
            font-family: monospace; 
            color: #888;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="pc-view" class="card">
        <img src="koko.png" alt="CEMA Logo" class="auth-logo">
        <h2>SECURE ACCESS</h2>
        <div id="login-form">
            <input type="text" id="login-username" placeholder="Masukkan Nama Anda">
            <button id="init-btn" onclick="requestHandshake()">INITIALIZE SESSION</button>
        </div>
        
        <div id="qr-container" style="display: none; margin-top: 20px;">
            <div id="qr-spot"></div>
            <p style="font-size: 0.9rem; color: var(--accent); font-weight: bold;">Scan dengan telefon untuk pengesahan</p>
            <div class="loading-text">MENUNGGU PENGESAHAN...</div>
        </div>
    </div>

    <div id="mobile-view" class="card">
        <img src="koko.png" alt="CEMA Logo" class="auth-logo">
        <h2>Authorize Login?</h2>
        <p style="color: #888;">Sahkan untuk membenarkan akses terminal kepada sesi ini.</p>
        <button id="approve-btn" onclick="approveSession()" style="background: var(--dark);">APPROVE ACCESS</button>
        <p id="status-msg" style="display:none; margin-top:15px; font-weight:bold; color: green;">BERJAYA! Sila lihat skrin terminal.</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('id');

        window.onload = () => {
            if (sessionId) {
                document.getElementById('mobile-view').style.display = 'block';
            } else {
                document.getElementById('pc-view').style.display = 'block';
            }
        };

        async function requestHandshake() {
            const userField = document.getElementById('login-username');
            const btn = document.getElementById('init-btn');
            const user = userField.value;

            if (!user) return alert("Sila masukkan Username");

            btn.disabled = true;
            btn.innerText = "CONNECTING...";

            try {
                const res = await fetch('/request-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user })
                });

                if (!res.ok) throw new Error('Server Error');

                const data = await res.json();

                if (data.qrImage) {
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('qr-container').style.display = 'block';
                    document.getElementById('qr-spot').innerHTML = `<img src="${data.qrImage}" style="width: 100%; max-width: 200px;">`;

                    const poll = setInterval(async () => {
                        try {
                            const statusRes = await fetch(`/check-status?id=${data.sessionId}`);
                            const statusData = await statusRes.json();
                            
                            if (statusData.status === 'approved') {
                                clearInterval(poll);
                                window.location.href = '/dashboard.html'; 
                            }
                        } catch (e) { console.error("Polling error"); }
                    }, 2000);     
                }
            } catch (err) {
                alert("Database or Connection Error! Sila check internet/hotspot.");
                btn.disabled = false;
                btn.innerText = "INITIALIZE SESSION";
            }
        }

        async function approveSession() {
            const btn = document.getElementById('approve-btn');
            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            try {
                const res = await fetch(`/approve-session?id=${sessionId}`);
                if (res.ok) {
                    btn.style.display = 'none';
                    document.getElementById('status-msg').style.display = 'block';
                } else {
                    alert("Gagal mengesahkan sesi.");
                    btn.disabled = false;
                    btn.innerText = "APPROVE ACCESS";
                }
            } catch (err) {
                alert("Error: Sambungan terputus.");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
