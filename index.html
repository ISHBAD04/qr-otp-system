<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMA Premium Auth</title>
    <style>
        :root {
            --accent: #FF4B5C; /* The Domino's Red */
            --bg-soft: #FFF5F6;
            --text-main: #2D2D2D;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        /* Login Overlay Styling */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-soft);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 350px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 75, 92, 0.1);
            text-align: center;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Inputs & Buttons */
        input {
            width: 80%;
            padding: 15px;
            border: 2px solid #FFE0E3;
            border-radius: 15px;
            margin: 20px 0;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }

        /* Dashboard View */
        .dashboard-content {
            display: none; /* Hidden until login */
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .qr-card {
            background: white;
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            margin-top: 20px;
        }

        #qr-container img {
            border-radius: 20px;
            margin: 15px 0;
            border: 4px solid var(--bg-soft);
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="logo-circle">CEMA</div>
        <div class="login-card">
            <h2 style="margin-top:0">Welcome back!</h2>
            <p style="color: #888;">Generate the QR below to get your OTP</p>
            
            <div id="login-qr-spot">
                </div>

            <button onclick="generateQR('login-qr-spot')" style="background: #333; margin-bottom: 15px;">
                1. GENERATE QR
            </button>

            <input type="text" id="otp-input" placeholder="Enter 6-digit OTP">
            
            <button onclick="verifyAndEnter()">2. VERIFY & ENTER</button>
        </div>
    </div>

    <div class="dashboard-content" id="main-dash">
        <h2 style="color: var(--accent)">Hello, Admin!</h2>
        <div class="qr-card">
            <h3>Security Hub</h3>
            <p>Scan successful! You are now logged into the secure terminal.</p>
            <button onclick="location.reload()" style="background: #eee; color: #333;">LOGOUT</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://qr-otp-system-g32y.vercel.app";

        async function generateQR(containerId) {
            const res = await fetch(`${API_BASE}/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: 'Admin_User' })
            });
            const data = await res.json();
            if(data.qrCode) {
                document.getElementById(containerId).innerHTML = 
                    `<img src="${data.qrCode}" width="180">`;
            }
        }

        async function verifyAndEnter() {
            const otp = document.getElementById('otp-input').value;
            const res = await fetch(`${API_BASE}/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: 'Admin_User', userOtp: otp })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-dash').style.display = 'block';
            } else {
                alert("Invalid OTP");
            }
        }
    </script>
</body>
</html>
